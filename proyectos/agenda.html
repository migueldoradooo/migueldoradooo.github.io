<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Agenda - Firestore</title>
  <link rel="stylesheet" href="../CSS/agenda.css">
</head>
<body>
  <div class="container">
    <h1>Agenda</h1>
    <form id="form">
      <input id="nameInput" placeholder="Introduce un nombre" required autocomplete="off">
      <button type="submit">Agregar</button>
    </form>

    <ul id="list"></ul>

    <p class="note">Sustituye la configuración de Firebase en el script embebido de esta página con tu proyecto.</p>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
    import { getAnalytics } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-analytics.js";
    import { getFirestore, collection, addDoc, onSnapshot, deleteDoc, doc, serverTimestamp, query, orderBy } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAJIydql2_a7S7H4ClhDvjk26e_CG8wzmc",
      authDomain: "clientes-db-ec584.firebaseapp.com",
      projectId: "clientes-db-ec584",
      storageBucket: "clientes-db-ec584.firebasestorage.app",
      messagingSenderId: "558458129111",
      appId: "1:558458129111:web:0d4231795520fc5694fe92",
      measurementId: "G-RMEE5KS4KF"
    };

    const app = initializeApp(firebaseConfig);
    getAnalytics(app);

    const db = getFirestore(app);
    const colRef = collection(db, 'agenda');
    const q = query(colRef, orderBy('createdAt'));

    window.AGENDA_DB = {
      db,
      colRef,
      q,
      addDoc,
      onSnapshot,
      deleteDoc,
      doc,
      serverTimestamp
    };
  </script>
  <script type="module" src="../javascript/agenda.js"></script>
</body>
</html>
